name: Safety Verification

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Z3 Formal Proofs ────────────────────────────────────────────────────────
  z3-proofs:
    name: Z3 Proof Obligations (36 POs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install z3-solver
        run: pip install z3-solver

      - name: Detect intent pattern changes
        run: python verification/check_pattern_hash.py

      - name: Run all Z3 proof obligations
        run: python verification/run_proofs.py

  # ── Rust Tests + Clippy ─────────────────────────────────────────────────────
  rust-tests:
    name: Rust Tests + Clippy (firewall-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (all lints as errors)
        run: cargo clippy -p firewall-core -- -D warnings

      - name: Run all tests
        run: cargo test -p firewall-core

  semantic-compile:
    name: Semantic Feature Compile Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Compile firewall-core with semantic feature
        run: cargo check -p firewall-core --features semantic

  # ── Node Wrapper Build + Smoke ─────────────────────────────────────────────
  node-wrapper:
    name: Node Wrapper Build + Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm install

      - name: Build native Node module
        run: npm run build:native

      - name: Build TypeScript wrapper
        run: npm run build

      - name: Run smoke test
        run: npm run smoke

      - name: Run conformance corpus
        run: npm run conformance

  # ── Python Binding Build + Smoke ───────────────────────────────────────────
  python-binding:
    name: Python Binding Build + Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install maturin

      - name: Build and install PyO3 module
        run: python -m maturin develop --manifest-path crates/firewall-pyo3/Cargo.toml

      - name: Run Python smoke test
        run: python scripts/smoke.py

      - name: Run Python conformance corpus
        run: python scripts/conformance.py

  # ── FP Rate Check ───────────────────────────────────────────────────────────
  fp-rate:
    name: False-Positive Rate (150 legitimate prompts)
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release CLI
        run: cargo build --release -p firewall-cli

      - name: Run FP rate test (must be 0.0%)
        run: python verification/fp_rate_test.py

  # ── Harmful Prompt Regression ───────────────────────────────────────────────
  harmful-regression:
    name: Harmful Prompt Regression (720 prompts)
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release CLI
        run: cargo build --release -p firewall-cli

      - name: Run JailbreakBench + AdvBench + structured-payload regression
        run: python verification/benchmark_datasets.py
